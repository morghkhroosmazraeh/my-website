<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>مرغ و خروس مزرعه</title>

    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <img src="images/header.png" alt="مرغ و خروس مزرعه">
    </header>

    <section class="cards">

        <!-- جوجه -->
        <div class="card">

            <img src="images/chick.png" alt="جوجه">

            <h2>جوجه</h2>

            <p>
                فروش انواع جوجه یک روزه نژاددار
                <br>
                با کیفیت بالا و سلامت کامل
            </p>

            <button>مشاهده محصولات</button>

        </div>

        <!-- مرغ -->
        <div class="card">

            <img src="images/morgh.png" alt="مرغ">

            <h2>مرغ</h2>

            <p>
                فروش انواع مرغ‌های محلی و نژاددار
                <br>
                مناسب برای پرورش، تخم‌گذاری و زینتی
            </p>

            <button>مشاهده محصولات</button>

        </div>

        <!-- خروس -->
        <div class="card">

            <img src="images/khroos.png" alt="خروس">

            <h2>خروس</h2>

            <p>
                فروش انواع خروس‌های نژاددار
                <br>
                مناسب پرورش و تکثیر
            </p>

            <button>مشاهده محصولات</button>

        </div>

    </section>

</body>

</html>
