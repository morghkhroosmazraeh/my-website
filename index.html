    <section class="cards">

            <img src="images/morgh.png" alt="مرغ">

                فروش انواع مرغ‌های محلی و نژاددار
                <br>
                مناسب برای پرورش، تخم‌گذاری و زینتی
            </p>

            <button>مشاهده محصولات</button>

        </div>

        <div class="card">

            <img src="images/khroos.png" alt="خروس">

            <h2>خروس</h2>

            <p>
                فروش انواع خروس‌های نژاددار

            <button>مشاهده محصولات</button>
